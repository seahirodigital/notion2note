<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notion2Note Switch</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <header class="topbar">
        <h1>Notion2Note</h1>
        <nav class="quick-links" aria-label="編集ファイル">
          <a id="affiliateLink" class="quick-link" href="#" target="_blank" rel="noreferrer" title="アフィリエイトリンクファイルを開く">A</a>
          <a id="tagLink" class="quick-link" href="#" target="_blank" rel="noreferrer" title="タグファイルを開く">#</a>
        </nav>
      </header>

      <section class="action-panel" aria-label="投稿操作">
        <button id="draftDispatch" type="button">下書き投稿</button>
        <button id="publishDispatch" class="publish-button" type="button">本番投稿</button>
        <p id="status" role="status"></p>
      </section>

      <label>
        Notion URL
        <span class="url-row">
          <input id="pageUrl" autocomplete="off">
          <button id="loadUrl" class="secondary-button" type="button">取得</button>
        </span>
      </label>

      <label>
        タイトル
        <input id="noteTitle" autocomplete="off">
      </label>

      <section class="settings" aria-label="GitHub設定">
        <label>
          GitHub Owner
          <input id="owner" autocomplete="off">
        </label>

        <label>
          Repository
          <input id="repo" autocomplete="off">
        </label>

        <label>
          Workflow
          <input id="workflow" autocomplete="off">
        </label>

        <label>
          Branch
          <input id="ref" autocomplete="off">
        </label>

        <label>
          GitHub Token
          <input id="token" type="password" autocomplete="off">
        </label>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
